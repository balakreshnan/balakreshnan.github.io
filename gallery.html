	<style>
		:root {
			--c-bg: #f7f9fc;
			--c-bg-alt: #ffffff;
			--c-text: #1f2a44;
			--c-text-soft: #4a5878;
			--c-muted: #7a8aa8;
			--c-primary: #2563eb;
			--c-primary-dark: #1d4ed8;
			--c-accent: #06b6d4;
			--c-border: #e3e9f2;
			--shadow-sm: 0 1px 3px rgba(15, 30, 60, 0.06), 0 1px 2px rgba(15, 30, 60, 0.04);
			--shadow-md: 0 4px 16px rgba(15, 30, 60, 0.08);
			--shadow-lg: 0 20px 50px rgba(15, 30, 60, 0.12);
			--radius: 14px;
			--radius-lg: 22px;
			--gradient-accent: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
			--gradient-hero: linear-gradient(135deg, #eaf2ff 0%, #f7f9fc 45%, #f0fbff 100%);
		}
		* { box-sizing: border-box; }
		html { scroll-behavior: smooth; }
		body {
			margin: 0;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color: var(--c-text); background: var(--c-bg); line-height: 1.65;
			-webkit-font-smoothing: antialiased;
		}
		h1, h2, h3 { font-family: 'Playfair Display', Georgia, serif; margin: 0 0 .4em; line-height: 1.2; }
		a { color: var(--c-primary); text-decoration: none; transition: color .2s ease; }
		a:hover { color: var(--c-primary-dark); }
		img { max-width: 100%; display: block; }
		.container { max-width: 1180px; margin: 0 auto; padding: 0 1.5rem; }

		/* NAV */
		.nav { position: sticky; top: 0; z-index: 100; backdrop-filter: saturate(180%) blur(14px); background: rgba(255,255,255,0.85); border-bottom: 1px solid var(--c-border); }
		.nav-inner { display: flex; align-items: center; justify-content: space-between; padding: .9rem 1.5rem; max-width: 1180px; margin: 0 auto; }
		.brand { display: flex; align-items: center; gap: .65rem; font-weight: 700; color: var(--c-text); font-size: 1.05rem; }
		.brand-mark { width: 36px; height: 36px; border-radius: 10px; background: var(--gradient-accent); display: grid; place-items: center; color: white; font-weight: 800; box-shadow: var(--shadow-sm); }
		.nav-links { display: flex; gap: 1.4rem; align-items: center; }
		.nav-links a { color: var(--c-text-soft); font-weight: 500; font-size: .95rem; }
		.nav-links a:hover { color: var(--c-primary); }
		.nav-cta { background: var(--gradient-accent); color: white !important; padding: .55rem 1.1rem; border-radius: 999px; font-weight: 600; box-shadow: var(--shadow-sm); }

		/* HEADER */
		.gallery-header { background: var(--gradient-hero); padding: 3rem 0 2.25rem; text-align: center; }
		.gallery-header .eyebrow { display: inline-flex; align-items: center; gap: .5rem; background: white; border: 1px solid var(--c-border); padding: .35rem .85rem; border-radius: 999px; font-size: .8rem; font-weight: 600; color: var(--c-primary); box-shadow: var(--shadow-sm); margin-bottom: 1rem; }
		.gallery-header h1 { font-size: clamp(2rem, 4vw, 3rem); }
		.gallery-header h1 .grad { background: var(--gradient-accent); -webkit-background-clip: text; background-clip: text; color: transparent; }
		.gallery-header p { color: var(--c-text-soft); max-width: 640px; margin: .5rem auto 0; }

		/* SLIDESHOW */
		.slideshow { padding: 2.5rem 0 3.5rem; }
		.stage {
			position: relative; width: 100%; aspect-ratio: 16 / 9;
			background: #0d1526; border-radius: var(--radius-lg); overflow: hidden;
			box-shadow: var(--shadow-lg); border: 1px solid var(--c-border);
		}
		.stage img {
			position: absolute; inset: 0; width: 100%; height: 100%;
			object-fit: contain; opacity: 0; transition: opacity .8s ease;
		}
		.stage img.active { opacity: 1; }
		.stage .caption {
			position: absolute; left: 0; right: 0; bottom: 0;
			background: linear-gradient(180deg, transparent, rgba(5, 12, 28, .8));
			color: #fff; padding: 2.5rem 1.5rem 1rem; font-size: .9rem;
			display: flex; justify-content: space-between; align-items: flex-end; gap: 1rem;
		}
		.caption .counter { font-weight: 600; white-space: nowrap; }
		/* arrows */
		.nav-arrow {
			position: absolute; top: 50%; transform: translateY(-50%);
			width: 48px; height: 48px; border-radius: 50%; border: 0;
			background: rgba(255,255,255,.85); color: var(--c-text); font-size: 1.1rem;
			cursor: pointer; display: grid; place-items: center; box-shadow: var(--shadow-md);
			transition: background .2s ease, transform .2s ease; z-index: 3;
		}
		.nav-arrow:hover { background: #fff; transform: translateY(-50%) scale(1.08); }
		.nav-arrow.prev { left: 1rem; }
		.nav-arrow.next { right: 1rem; }
		/* progress bar */
		.progress { position: absolute; top: 0; left: 0; height: 4px; background: var(--gradient-accent); width: 0; z-index: 3; }

		/* CONTROLS */
		.controls { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; justify-content: center; margin-top: 1.25rem; }
		.ctrl-btn {
			display: inline-flex; align-items: center; gap: .5rem; padding: .6rem 1.1rem;
			border-radius: 999px; font-weight: 600; font-size: .9rem; cursor: pointer;
			border: 1px solid var(--c-border); background: #fff; color: var(--c-text); transition: all .2s ease;
		}
		.ctrl-btn:hover { border-color: var(--c-primary); color: var(--c-primary); }
		.ctrl-btn.primary { background: var(--gradient-accent); color: #fff; border: 0; box-shadow: var(--shadow-md); }
		.ctrl-btn.primary:hover { color: #fff; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
		.speed { display: inline-flex; align-items: center; gap: .5rem; font-size: .85rem; color: var(--c-muted); }
		.speed select { padding: .45rem .6rem; border-radius: 8px; border: 1px solid var(--c-border); background: #fff; color: var(--c-text); font-family: inherit; }

		/* THUMBS */
		.thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); gap: .5rem; margin-top: 2rem; }
		.thumb { aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; border: 2px solid transparent; background: #e9eef7; transition: border-color .2s ease, transform .2s ease; }
		.thumb img { width: 100%; height: 100%; object-fit: cover; }
		.thumb:hover { transform: translateY(-2px); }
		.thumb.active { border-color: var(--c-primary); }

		/* FOOTER */
		.footer { background: #0d1526; color: #aebbd4; padding: 2rem 0; text-align: center; font-size: .9rem; margin-top: 2rem; }
		.footer a { color: #cfe0ff; }

		@media (max-width: 700px) {
			.nav-links a:not(.nav-cta) { display: none; }
			.stage { aspect-ratio: 4 / 3; }
			.nav-arrow { width: 40px; height: 40px; }

		const stage = document.getElementById('stage');
		const captionText = document.getElementById('captionText');
		const counter = document.getElementById('counter');
		const progress = document.getElementById('progress');
		const thumbsWrap = document.getElementById('thumbs');
		const playPauseBtn = document.getElementById('playPauseBtn');
		const speedSelect = document.getElementById('speedSelect');

		let order = IMAGES.map((_, i) => i);
		let pos = 0;           // position within order
		let playing = true;
		let interval = parseInt(speedSelect.value, 10);
		let timer = null;
		let progTimer = null;

		// Build two stacked <img> elements for cross-fade
		const layers = [document.createElement('img'), document.createElement('img')];
		layers.forEach(img => { img.loading = 'lazy'; img.alt = 'Gallery photo'; stage.insertBefore(img, stage.querySelector('.caption')); });
		let activeLayer = 0;

		function srcFor(idx) { return encodeURI(IMAGES[idx]); }

		function labelFor(idx) {
			let name = IMAGES[idx].split('/').pop().replace(/\.[^.]+$/, '');
			return name.replace(/[_]+/g, ' ');
		}

		function show(orderIdx, instant) {
			pos = (orderIdx + order.length) % order.length;
			const imgIdx = order[pos];
			const next = layers[1 - activeLayer];
			const cur = layers[activeLayer];
			next.onload = () => {
				next.classList.add('active');
				cur.classList.remove('active');
				activeLayer = 1 - activeLayer;
			};
			next.src = srcFor(imgIdx);
			if (instant) { next.classList.add('active'); cur.classList.remove('active'); }
			captionText.textContent = labelFor(imgIdx);
			counter.textContent = (pos + 1) + ' / ' + order.length;
			updateActiveThumb(imgIdx);
			restartProgress();
		}

		function next() { show(pos + 1); }
		function prev() { show(pos - 1); }

		function restartProgress() {
			if (progTimer) cancelAnimationFrame(progTimer);
			if (!playing) { progress.style.width = '0%'; return; }
			const start = performance.now();
			function step(now) {
				const pct = Math.min(100, ((now - start) / interval) * 100);
				progress.style.width = pct + '%';
				if (pct < 100) progTimer = requestAnimationFrame(step);
			}
			progTimer = requestAnimationFrame(step);
		}

		function startTimer() {
			stopTimer();
			timer = setInterval(next, interval);
			restartProgress();
		}
		function stopTimer() { if (timer) { clearInterval(timer); timer = null; } }

		function setPlaying(state) {
			playing = state;
			playPauseBtn.innerHTML = playing
				? '<i class="fa-solid fa-pause"></i> <span>Pause</span>'
				: '<i class="fa-solid fa-play"></i> <span>Play</span>';
			if (playing) startTimer(); else { stopTimer(); progress.style.width = '0%'; }
		}

		// Thumbnails
		function buildThumbs() {
			const frag = document.createDocumentFragment();
			IMAGES.forEach((src, idx) => {
				const d = document.createElement('div');
				d.className = 'thumb';
				d.dataset.idx = idx;
				const im = document.createElement('img');
				im.loading = 'lazy';
				im.src = encodeURI(src);
				im.alt = labelFor(idx);
				d.appendChild(im);
				d.addEventListener('click', () => {
					const orderPos = order.indexOf(idx);
					show(orderPos);
					if (playing) startTimer();
				});
				frag.appendChild(d);
			});
			thumbsWrap.appendChild(frag);
		}

		function updateActiveThumb(imgIdx) {
			thumbsWrap.querySelectorAll('.thumb.active').forEach(t => t.classList.remove('active'));
			const el = thumbsWrap.querySelector('.thumb[data-idx="' + imgIdx + '"]');
			if (el) el.classList.add('active');
		}

		// Controls
		playPauseBtn.addEventListener('click', () => setPlaying(!playing));
		document.getElementById('nextBtn').addEventListener('click', () => { next(); if (playing) startTimer(); });
		document.getElementById('prevBtn').addEventListener('click', () => { prev(); if (playing) startTimer(); });
		document.getElementById('nextBtn2').addEventListener('click', () => { next(); if (playing) startTimer(); });
		document.getElementById('prevBtn2').addEventListener('click', () => { prev(); if (playing) startTimer(); });
		speedSelect.addEventListener('change', () => { interval = parseInt(speedSelect.value, 10); if (playing) startTimer(); });

		document.getElementById('fsBtn').addEventListener('click', () => {
			if (!document.fullscreenElement) stage.requestFullscreen && stage.requestFullscreen();
			else document.exitFullscreen && document.exitFullscreen();
		});

		document.getElementById('shuffleBtn').addEventListener('click', () => {
			for (let i = order.length - 1; i > 0; i--) {
				const j = Math.floor(Math.random() * (i + 1));
				[order[i], order[j]] = [order[j], order[i]];
			}
			show(0);
			if (playing) startTimer();
		});

		document.addEventListener('keydown', (e) => {
			if (e.key === 'ArrowRight') { next(); if (playing) startTimer(); }
			else if (e.key === 'ArrowLeft') { prev(); if (playing) startTimer(); }
			else if (e.key === ' ') { e.preventDefault(); setPlaying(!playing); }
		});

		document.getElementById('year').textContent = new Date().getFullYear();

		// Init
		buildThumbs();
		show(0, true);
		startTimer();
	</script>
</body>
</html>
